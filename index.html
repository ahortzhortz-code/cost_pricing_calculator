        <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Input Elements (Fixed fields) ---
            const inputs = {
                totalProd: document.getElementById('totalProd'),
                sampleQty: document.getElementById('sampleQty'),
                defectQty: document.getElementById('defectQty'),
                prodCost: document.getElementById('prodCost'),
                pkgCostPerItem: document.getElementById('pkgCostPerItem'),
                desiredProfit: document.getElementById('desiredProfit'),
                targetPrice: document.getElementById('targetPrice')
            };

            // --- Result Elements ---
<!-- ... existing code ... -->
                document.querySelectorAll('.dyn-amount').forEach(el => {
                    el.addEventListener('input', (e) => {
                        currentDynamicCosts[e.target.dataset.index].amount = parseFloat(e.target.value) || 0;
                        calculate('costs'); // คำนวณใหม่ทุกครั้งที่ตัวเลขเปลี่ยน (แจ้งว่ามาจากต้นทุน)
                    });
                    el.addEventListener('focus', function() { this.select(); });
                });

                // ผูก Event ให้ปุ่มลบ
                document.querySelectorAll('.btn-delete-cost').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const idx = e.currentTarget.dataset.index;
                        currentDynamicCosts.splice(idx, 1);
                        renderDynamicCosts(); // วาด UI ใหม่
                        calculate('costs'); // คำนวณใหม่
                    });
                });
<!-- ... existing code ... -->
            });

            // --- Calculation Logic ---
            const calculate = (source = 'costs') => {
                // Parse fixed inputs 
                const totalProd = parseInt(inputs.totalProd.value) || 0;
                const sampleQty = parseInt(inputs.sampleQty.value) || 0;
                const defectQty = parseInt(inputs.defectQty.value) || 0;
                
                const prodCost = parseFloat(inputs.prodCost.value) || 0;
                const pkgCostPerItem = parseFloat(inputs.pkgCostPerItem.value) || 0;

                // รวมผลลัพธ์จากช่องต้นทุนเสริมทั้งหมด
                const totalDynamicCost = currentDynamicCosts.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);

                // 1. จำนวนชิ้นที่ขายได้จริง
                let sellableQty = totalProd - sampleQty - defectQty;
                if (sellableQty < 0) sellableQty = 0;

                // 2. ต้นทุนรวมทั้งหมด
                const totalPackagingCost = pkgCostPerItem * sellableQty;
                const totalCost = prodCost + totalPackagingCost + totalDynamicCost;

                // 3. ต้นทุนรวมเฉลี่ยต่อชิ้น
                let costPerItem = 0;
                if (sellableQty > 0) {
                    costPerItem = totalCost / sellableQty;
                }

                // ==========================================
                // ระบบตั้งราคาขายแบบ 2 ทาง (Two-way Calculation)
                // ==========================================
                const validCost = isNaN(costPerItem) ? 0 : costPerItem;

                if (source === 'desiredProfit') {
                    // ถ้ายูสเซอร์พิมพ์แก้ช่อง "กำไรที่อยากได้" -> ให้คำนวณ "ราคาที่ควรขาย" ใหม่
                    const desired = parseFloat(inputs.desiredProfit.value) || 0;
                    inputs.targetPrice.value = (validCost + desired).toFixed(2);
                } else {
                    // ถ้ายูสเซอร์แก้ราคาขาย หรือ แก้ต้นทุนต่างๆ -> ให้คำนวณ "กำไรที่ได้" ใหม่
                    const tp = parseFloat(inputs.targetPrice.value) || 0;
                    inputs.desiredProfit.value = (tp - validCost).toFixed(2);
                }

                // นำราคาขาย ณ ปัจจุบัน มาใช้คำนวณต่อ
                const targetPrice = parseFloat(inputs.targetPrice.value) || 0;

                // 4. กำไรต่อชิ้น (สำหรับแสดงผล)
                const profitPerItem = targetPrice - costPerItem;

                // 5. กำไรต่อยอดขาย %
                let profitMargin = 0;
                if (targetPrice > 0) {
                     profitMargin = (profitPerItem / targetPrice) * 100;
                }

                // 6. จุดคุ้มทุน
                let breakEvenQty = 0;
                if (targetPrice > 0) {
                    breakEvenQty = Math.ceil(totalCost / targetPrice);
                }

                // 7. กำไรรวมเมื่อขายหมด
                const totalRevenue = targetPrice * sellableQty;
                const totalProfit = totalRevenue - totalCost;

                // --- Update UI ---
<!-- ... existing code ... -->
                results.totalProfit.className = totalProfit >= 0 ? "text-2xl text-accent2 font-black" : "text-2xl text-red-600 font-black";
            };

            // Add input event listeners to Fixed inputs
            Object.values(inputs).forEach(input => {
                // แยก event listener เพื่อดูว่ายูสเซอร์กำลังแก้ไขช่องไหน
                if (input === inputs.desiredProfit) {
                    input.addEventListener('input', () => calculate('desiredProfit'));
                } else if (input === inputs.targetPrice) {
                    input.addEventListener('input', () => calculate('targetPrice'));
                } else {
                    input.addEventListener('input', () => calculate('costs'));
                }
                
                input.addEventListener('focus', function() { this.select(); });
            });

            // Reset Button
            document.getElementById('btnReset').addEventListener('click', () => {
<!-- ... existing code ... -->
                // Reset dynamic fields back to default array
                currentDynamicCosts = JSON.parse(JSON.stringify(defaultDynamicCosts));
                
                renderDynamicCosts();
                calculate('costs'); // บังคับคำนวณใหม่โดยยึดราคาขายเป็นหลัก
                showToast("ล้างข้อมูลเรียบร้อยแล้ว");
            });

            // --- Storage & Logic (อัปเดตให้จำค่าในเครื่อง) ---
            const STORAGE_KEY = 'costCalculatorSavedData';
            
            // โหลดข้อมูลจาก Local Storage ตอนเปิดเว็บ ถ้าไม่มีให้ใช้ Object ว่าง
            let savedData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; 

            // Save Data
            document.getElementById('btnSave').addEventListener('click', () => {
                const pName = document.getElementById('productName').value.trim();
                
                if (!pName || pName === '') {
                    showToast("กรุณาตั้งชื่อสินค้าก่อนบันทึก!");
                    document.getElementById('productName').focus();
                    return;
                }

                // เก็บค่าคงที่ และค่า Dynamic Costs ลง Object
                savedData[pName] = {
                    name: pName,
                    totalProd: inputs.totalProd.value,
                    sampleQty: inputs.sampleQty.value,
                    defectQty: inputs.defectQty.value,
                    prodCost: inputs.prodCost.value,
                    pkgCostPerItem: inputs.pkgCostPerItem.value,
                    targetPrice: inputs.targetPrice.value,
                    dynamicCosts: JSON.parse(JSON.stringify(currentDynamicCosts)), // Clone data
                    sellableQty: results.sellableQty.textContent,
                    profitPerItem: results.profitPerItem.textContent,
                };
                
                // บันทึกลง Local Storage เพื่อให้จำค่าถาวรในเครื่อง
                localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData));
                
                renderSavedItems();
                showToast(`บันทึกข้อมูล "${pName}" เรียบร้อยแล้ว!`);
            });

            // Render Saved Items List
            function renderSavedItems() {
